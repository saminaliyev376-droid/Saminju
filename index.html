<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Analytics | Ultra Professional UI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #a855f7;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f9fafb;
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
        }

        /* Side Navigation */
        .sidebar {
            width: 280px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 15px; padding-left: 15px; }

        .nav-item {
            padding: 14px 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text);
            box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.2);
        }

        .nav-item i { font-size: 18px; }

        /* Main Workspace */
        .workspace {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .stat-card h4 { color: var(--text-muted); font-size: 13px; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 800; }

        /* Chart Area */
        .main-chart {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            height: 400px;
        }

        .badge-up { color: #10b981; font-size: 12px; font-weight: 600; }

        /* Button Pro */
        .btn-upgrade {
            margin-top: auto;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-bezier-curve"></i> QUANTUM
        </div>

        <div class="nav-group">
            <p class="nav-label">Menyu</p>
            <div class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</div>
            <div class="nav-item"><i class="fas fa-project-diagram"></i> Proyektlər</div>
            <div class="nav-item"><i class="fas fa-bolt"></i> Performans</div>
        </div>

        <div class="nav-group">
            <p class="nav-label">İdarəetmə</p>
            <div class="nav-item"><i class="fas fa-user-shield"></i> Təhlükəsizlik</div>
            <div class="nav-item"><i class="fas fa-database"></i> Verilənlər</div>
        </div>

        <button class="btn-upgrade">Sistemi Yenilə</button>
    </aside>

    <main class="workspace">
        <header class="header">
            <div>
                <h1 style="font-size: 32px; font-weight: 800;">Xoş gəldiniz, Admin</h1>
                <p style="color: var(--text-muted);">Sizin üçün bugünkü statistikalar hazırdır.</p>
            </div>
            <div class="user-profile">
                <i class="fas fa-bell"></i>
                <div style="width: 1px; height: 20px; background: var(--border);"></div>
                <span style="font-weight: 600;">Nicat D.</span>
                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix" class="avatar">
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>Gəlir (Aylıq)</h4>
                <div class="value">$124,500</div>
                <span class="badge-up"><i class="fas fa-arrow-up"></i> 14.2%</span>
            </div>
            <div class="stat-card">
                <h4>İstifadəçi Sayı</h4>
                <div class="value">48,200</div>
                <span class="badge-up"><i class="fas fa-arrow-up"></i> 8.1%</span>
            </div>
            <div class="stat-card">
                <h4>Aktiv Serverlər</h4>
                <div class="value">99.9%</div>
                <span style="color: var(--primary); font-size: 12px;">Stabil</span>
            </div>
            <div class="stat-card">
                <h4>Xətalar</h4>
                <div class="value">0.02%</div>
                <span style="color: var(--text-muted); font-size: 12px;">Minimal</span>
            </div>
        </div>

        <div class="main-chart">
            <canvas id="myChart"></canvas>
        </div>
    </main>

    <script>
        // Professional Qrafik Parametrləri
        const ctx = document.getElementById('myChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(99, 102, 241, 0.4)');
        gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Yan', 'Fev', 'Mar', 'Apr', 'May', 'İyun', 'İyul'],
                datasets: [{
                    label: 'Sistem Yüklənməsi',
                    data: [30, 45, 35, 60, 55, 80, 75],
                    borderColor: '#6366f1',
                    borderWidth: 4,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9ca3af' } },
                    x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                }
            }
        });

        // Menyu keçidləri
        const items = document.querySelectorAll('.nav-item');
        items.forEach(item => {
            item.addEventListener('click', () => {
                items.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
